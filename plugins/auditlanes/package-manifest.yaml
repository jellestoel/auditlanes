adapter_templates:
  codex:
    committed: "resources/adapters/AGENTS.md"
    local: "resources/adapters/AGENTS.override.md"
  claude:
    committed: "resources/adapters/CLAUDE.md"
    local: "resources/adapters/CLAUDE.local.md"
  skills:
    codex: "resources/adapters/codex-skill/SKILL.md"
    claude: "resources/adapters/claude-skill/SKILL.md"

claude_plugin:
  manifest: ".claude-plugin/plugin.json"
  primary_skill: "skills/scan/SKILL.md"
  slash_command: "/auditlanes:scan"
  bundled_protocol_root: "resources/repo-scaffold/auditlanes"
  install_hint: "/plugin install auditlanes@<marketplace>"
  reload_hint: "/reload-plugins"

codex_plugin:
  manifest: ".codex-plugin/plugin.json"
  primary_skill: "codex-skills/auditlanes/SKILL.md"
  bundled_protocol_root: "resources/repo-scaffold/auditlanes"
  install_hint: "codex plugin marketplace add <marketplace>, then install or enable AuditLanes from the plugin browser"
  default_behavior: "Under-specified Codex security audit requests run the complete pre-fix security protocol by default; advisor output is calibration input rather than an operator choice gate."

cli:
  status: "planned-packaged-cli"
  available_commands:
    - "python3 plugins/auditlanes/scripts/scan_advisor.py <target_root>"
    - "python3 plugins/auditlanes/scripts/validate_run.py <run_dir>"
    - "python3 plugins/auditlanes/scripts/reduce_run.py <run_dir>"
  planned_commands:
    - "auditlanes plugin hint"
    - "auditlanes install-claude-plugin --scope user"
    - "auditlanes install-codex-plugin --scope user"
    - "auditlanes install-claude-skill --scope user"
    - "auditlanes init . --minimal"
    - "auditlanes doctor ."
    - "auditlanes validate-run auditlanes/out/runs/<run_id>"
    - "auditlanes clean . --keep-reports"
    - "auditlanes upgrade ."

known_limitations:
  - "The security profile is stable runnable; production-integrity, performance, and workflow-evidence are experimental runnable."
  - "The architecture profile is metadata-only; --allow-experimental is for profile-loading/catalog checks and does not make architecture sidecars runnable."
  - "strategy:auto and small-app-invariant-audit are protocol contracts; a packaged CLI/orchestrator that performs automatic relevance scoring is still planned."
  - "scan_advisor.py performs minimal static relevance scoring; an interactive numbered-choice wizard is still planned."
  - "YAML contract files remain agent/reducer guidance; executable JSON Schema currently covers profile-specific report sidecars and batch manifests; validate_run.py adds profile-specific semantic checks."
  - "The reducer implementation imports confirmed findings, candidates, rejected claims, profile feedback, chain candidates, incidental leads, security smells, production risk signals, proof updates, run-local checks, and regression recommendations. It emits basic next-batch directives from incidental leads, run-local checks, and cross-lane triggers, and has a lenient recovery mode for schema-drifted agent outputs. It does not yet process coverage, final reports, or scope mutation."
  - "A packaged auditlanes CLI command is not included in this repository snapshot."
  - "production-integrity, performance, and workflow-evidence are runnable but still experimental; their profile contracts should be treated as less stable than security."

upgrade_rules:
  - "Replace managed files that are unchanged from the previously installed version."
  - "Write .new files or show diffs for locally edited managed files."
  - "Never overwrite profiles/project.yaml."
  - "Never touch auditlanes/out/."
  - "Update root adapter managed blocks idempotently."

release_rules:
  - "Bump .claude-plugin/plugin.json version and .codex-plugin/plugin.json version on every published marketplace release."
  - "Keep package-manifest.yaml version aligned with platform plugin manifest versions."
