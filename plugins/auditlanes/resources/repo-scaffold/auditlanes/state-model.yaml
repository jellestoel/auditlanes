version: 1
name: auditlanes-state-model

statuses:
  finding_status:
    - lead
    - candidate
    - confirmed-static
    - runtime-confirmed
    - blocked
    - rejected
    - duplicate
    - fixed
    - reswept-open
    - reswept-closed

common_types:
  evidence_ref:
    fields:
      - name: path
        type: string
      - name: line_start
        type: integer
      - name: line_end
        type: integer_or_null
      - name: symbol
        type: string_or_null
      - name: evidence_type
        type: string
      - name: snippet_hash
        type: string_or_null
      - name: rationale
        type: string
  structure_ref:
    fields:
      - name: path
        type: string
      - name: evidence_type
        type: string
      - name: rationale
        type: string
      - name: line_start
        type: integer_or_null
      - name: line_end
        type: integer_or_null
      - name: confidence
        type: string_or_null

append_policy:
  - "Lane workers must not invent JSONL field shapes. Use the fields in this state model and the executable schemas in resources/schemas/."
  - "If multiple lanes are active, avoid direct concurrent appends to shared state/*.jsonl unless the host provides atomic append with retry."
  - "Preferred concurrent pattern: each lane returns report.json plus any state rows inline or in lane-owned drafts; the reducer imports normalized shared state after the batch."
  - "Every JSONL row that has a schema_version field uses schema_version: 1 unless a future schema says otherwise."

required_state_schema_files:
  attack_surface_graph: "resources/schemas/attack-surface.schema.json"
  attack_surface_inventory: "resources/schemas/attack-surface-inventory.schema.json"
  authorization_matrix: "resources/schemas/authorization-matrix.schema.json"
  incidental_leads: "resources/schemas/incidental-lead.schema.json"
  proof_ledger: "resources/schemas/proof-ledger.schema.json"
  regression_plan: "resources/schemas/regression-plan.schema.json"
  run_local_checks: "resources/schemas/run-local-check.schema.json"
  security_invariants: "resources/schemas/security-invariant.schema.json"
  security_smells: "resources/schemas/security-smell.schema.json"
  unowned_surfaces: "resources/schemas/unowned-surface.schema.json"

records:
  relevance_plan:
    format: yaml
    fields:
      - name: schema_version
        type: integer
      - name: profile
        type: string
      - name: requested_strategy
        type: string
      - name: resolved_strategy
        type: string
      - name: resolved_overlays
        type: string_list
      - name: coverage_mode
        type: enum
        values:
          - full-read
          - focused-lanes
          - risk-ranked
          - hybrid
      - name: resolution_reason
        type: string_or_null
      - name: repo_observations
        type: object
      - name: runtime_validation
        type: boolean
      - name: output_style
        type: string
      - name: selected_checks
        type: object_list
      - name: deprioritized_checks
        type: object_list
      - name: universal_checks_enabled
        type: boolean
      - name: agent_discretion_enabled
        type: boolean
      - name: uncertainty
        type: string_list
      - name: coverage_gaps
        type: string_list
      - name: advisor
        type: object

  finding_inventory:
    format: jsonl
    fields:
      - name: schema_version
        type: integer
      - name: finding_id
        type: string
      - name: root_cause_id
        type: string
      - name: id_policy_version
        type: integer
      - name: dedupe_key
        type: object
      - name: provisional_ids
        type: string_list
      - name: source_reports
        type: object_list
      - name: record_created_at
        type: string
      - name: record_updated_at
        type: string
      - name: owner_family
        type: enum
        values_from: selected_profile.lanes
      - name: status
        type: enum
        source: finding_status
      - name: severity
        type: enum
        values:
          - critical
          - high
          - medium
          - low
          - info
      - name: confidence
        type: enum
        values:
          - certain
          - probable
          - speculative
      - name: first_seen_batch
        type: string
      - name: last_touched_batch
        type: string
      - name: summary
        type: string
      - name: entrypoint
        type: string_or_null
      - name: security_invariant
        type: string_or_null
      - name: attacker_precondition
        type: string_or_null
      - name: introduced_after_batch_01
        type: boolean
      - name: duplicate_of
        type: string_or_null
      - name: clone_of
        type: string_or_null
      - name: related_findings
        type: string_list
      - name: files
        type: string_list
      - name: evidence_refs
        type: evidence_ref_list
      - name: report_refs
        type: string_list
      - name: lead_source_refs
        type: string_list
      - name: widespread_pattern
        type: boolean
      - name: estimated_clone_count
        type: integer_or_null
      - name: missing_guard
        type: string
      - name: impact_boundary
        type: string
      - name: severity_rationale
        type: string_or_null
      - name: candidate_blocker
        type: string_or_null
      - name: runtime_status
        type: enum_or_null
        values:
          - confirmed-at-runtime
          - not-reproduced
          - blocked-by-ingress-or-environment
          - unsafe-to-validate-without-separate-approval

  rejected_inventory:
    format: jsonl
    fields:
      - name: schema_version
        type: integer
      - name: claim_id
        type: string
      - name: source_family
        type: string
      - name: batch_id
        type: string
      - name: reason
        type: string
      - name: subsumed_by
        type: string_or_null

  coverage_inventory:
    format: jsonl
    fields:
      - name: schema_version
        type: integer
      - name: coverage_unit_id
        type: string
      - name: owner_family
        type: string
      - name: description
        type: string
      - name: source_paths
        type: string_list
      - name: triaged
        type: boolean
      - name: canonical_done
        type: boolean
      - name: clonehunt_done
        type: boolean
      - name: runtime_done
        type: boolean
      - name: chain_done
        type: boolean
      - name: resweep_done
        type: boolean
      - name: current_gap
        type: string_or_null
      - name: last_touched_batch
        type: string_or_null
      - name: notes
        type: string_or_null

  chain_inventory:
    format: jsonl
    fields:
      - name: schema_version
        type: integer
      - name: chain_id
        type: string
      - name: component_findings
        type: string_list
      - name: families_involved
        type: string_list
      - name: impact
        type: string
      - name: confidence
        type: enum
        values:
          - certain
          - probable
          - speculative
      - name: status
        type: enum
        values:
          - candidate
          - confirmed
          - rejected

  profile_feedback_inventory:
    format: jsonl
    fields:
      - name: schema_version
        type: integer
      - name: profile_gap_id
        type: string
      - name: family
        type: string
      - name: affected_families
        type: string_list
      - name: observed_issue
        type: string
      - name: suggested_change
        type: string
      - name: evidence_refs
        type: evidence_ref_list
      - name: urgency
        type: enum
        values:
          - high
          - medium
          - low
      - name: reducer_status
        type: enum
        values:
          - accepted
          - rejected
          - deferred
      - name: reducer_reason
        type: string_or_null

  incidental_leads:
    format: jsonl
    fields:
      - name: schema_version
        type: integer
      - name: lead_id
        type: string
      - name: noticed_by_family
        type: string
      - name: proposed_owner_family
        type: string
      - name: source_reports
        type: object_list
      - name: first_seen_batch
        type: string
      - name: last_touched_batch
        type: string
      - name: severity_hint
        type: enum
        values:
          - critical
          - high
          - medium
          - low
          - info
      - name: confidence
        type: enum
        values:
          - certain
          - probable
          - speculative
      - name: summary
        type: string
      - name: why_noticed
        type: string_or_null
      - name: blocker_to_confirmation
        type: string
      - name: files
        type: string_list
      - name: evidence_refs
        type: evidence_ref_list
      - name: status
        type: enum
        values:
          - needs-triage
          - promoted
          - rejected

  security_smells:
    format: jsonl
    fields:
      - name: schema_version
        type: integer
      - name: smell_id
        type: string
      - name: category
        type: string
      - name: source_family
        type: string
      - name: source_reports
        type: object_list
      - name: first_seen_batch
        type: string
      - name: last_touched_batch
        type: string
      - name: path
        type: string
      - name: line_start
        type: integer_or_null
      - name: description
        type: string
      - name: recommended_owner
        type: string
      - name: status
        type: enum
        values:
          - needs-triage
          - promoted
          - rejected

  proof_ledger:
    format: jsonl
    fields:
      - name: schema_version
        type: integer
      - name: subject_id
        type: string
      - name: proof_level
        type: enum
        values:
          - P0-lead
          - P1-candidate
          - P2-static-confirmed
          - P3-reachability-confirmed
          - P4-runtime-confirmed
          - P5-regression-backed
      - name: source_family
        type: string
      - name: source_reports
        type: object_list
      - name: last_touched_batch
        type: string
      - name: evidence_summary
        type: string
      - name: runtime_validation
        type: object_or_null
      - name: regression_status
        type: string_or_null
      - name: evidence_refs
        type: evidence_ref_list

  regression_plan:
    format: jsonl
    fields:
      - name: schema_version
        type: integer
      - name: regression_id
        type: string
      - name: finding_id
        type: string
      - name: source_family
        type: string
      - name: source_reports
        type: object_list
      - name: last_touched_batch
        type: string
      - name: recommended_regression
        type: string
      - name: test_name
        type: string
      - name: guard_asserted
        type: string
      - name: automation_status
        type: string
      - name: owner_hint
        type: string_or_null

  run_local_checks:
    format: jsonl
    fields:
      - name: schema_version
        type: integer
      - name: check_id
        type: string
      - name: source_family
        type: string
      - name: recommended_owner_family
        type: string_or_null
      - name: source_reports
        type: object_list
      - name: first_seen_batch
        type: string
      - name: last_touched_batch
        type: string
      - name: reason
        type: string
      - name: trigger_evidence_refs
        type: evidence_ref_list
      - name: extends_checks
        type: string_list
      - name: scope_impact
        type: string
      - name: regression_impact
        type: string_or_null
      - name: status
        type: enum
        values:
          - active
          - promoted
          - retired

  attack_surface_inventory:
    format: jsonl
    fields:
      - name: schema_version
        type: integer
      - name: surface_id
        type: string
      - name: category
        type: string
      - name: owner_family
        type: string
      - name: description
        type: string
      - name: paths
        type: string_list
      - name: evidence_refs
        type: evidence_ref_list

  security_invariants:
    format: jsonl
    fields:
      - name: schema_version
        type: integer
      - name: invariant_id
        type: string
      - name: summary
        type: string
      - name: asset_types
        type: string_list
      - name: principal_types
        type: string_list
      - name: actions
        type: string_list
      - name: expected_controls
        type: string_list
      - name: owner_family
        type: string
      - name: secondary_families
        type: string_list
      - name: evidence_refs
        type: evidence_ref_list

  attack_surface_graph:
    format: jsonl
    fields:
      - name: schema_version
        type: integer
      - name: surface_id
        type: string
      - name: entrypoint
        type: string
      - name: principal_types
        type: string_list
      - name: assets
        type: string_list
      - name: actions
        type: string_list
      - name: guards
        type: string_list
      - name: trust_boundaries
        type: string_list
      - name: risk_score
        type: integer
      - name: owner_family
        type: string
      - name: secondary_families
        type: string_list
      - name: evidence_refs
        type: evidence_ref_list

  authorization_matrix:
    format: jsonl
    fields:
      - name: schema_version
        type: integer
      - name: matrix_id
        type: string
      - name: principal
        type: string
      - name: object
        type: string
      - name: action
        type: string
      - name: expected
        type: string
      - name: observed_guard
        type: string
      - name: status
        type: string
      - name: surface_id
        type: string
      - name: evidence_refs
        type: evidence_ref_list

  unowned_surfaces:
    format: jsonl
    fields:
      - name: schema_version
        type: integer
      - name: surface_id
        type: string
      - name: reason
        type: string
      - name: paths
        type: string_list
      - name: risk_hint
        type: string
      - name: status
        type: string

  family_directives:
    format: yaml
    fields:
      - name: schema_version
        type: integer
      - name: family
        type: string
      - name: next_mode
        type: string
      - name: reason
        type: string
      - name: priority_targets
        type: string_list
      - name: source_ids
        type: string_list

  run_events:
    format: jsonl
    fields:
      - name: schema_version
        type: integer
      - name: event_id
        type: string
      - name: event_type
        type: string
      - name: occurred_at
        type: string
      - name: batch_id
        type: string_or_null
      - name: family
        type: string_or_null
      - name: severity
        type: string
      - name: message
        type: string
      - name: input_hashes
        type: object_list

status_specific_requirements:
  lead:
    required:
      - schema_version
      - status
      - summary
      - lead_source_refs
  candidate:
    required:
      - schema_version
      - status
      - summary
      - confidence
      - candidate_blocker
      - dedupe_key
  confirmed-static:
    required:
      - schema_version
      - finding_id
      - root_cause_id
      - status
      - severity
      - confidence
      - missing_guard
      - impact_boundary
      - evidence_refs
      - severity_rationale
  rejected:
    storage: "rejected_inventory"
  duplicate:
    required:
      - duplicate_of
