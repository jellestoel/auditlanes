version: 1
id: auto
profile: production-integrity
status: experimental
description: "Infer production-integrity strategy, overlays, and check focus from static repository calibration."
resolution:
  default_strategy: production-gate
  overlays: auto
  require_core_workflow_inventory: true
  require_production_invariant_catalog: true
  require_assurance_evidence_map: true
  output_artifact: state/relevance-plan.yaml
allowed_modes:
  - readiness-sweep
  - invariant-gap-fill
  - control-clonehunt
  - scenario-probe
  - runtime-safe
  - post-fix-resweep
  - launch-gate-synthesis
  - failure-scenario-synthesis
required_state_artifacts:
  - state/relevance-plan.yaml
anti_tunnel:
  universal_reportability: true
  reviewers_may_emit_out_of_lane_leads: true
  reducer_assigns_final_owner: true
  broad_sanity_pass_recommended: true
  final_failure_scenario_review_recommended: true
  strategy_may_prioritize_but_not_exclude_issue_classes: true
  overlays_may_add_focus_but_not_hide_unrelated_high_severity_findings: true
  final_report_must_include_unresolved_incidental_leads: true
