version: 1
id: next-prisma-business-app
profile: production-integrity
status: experimental
description: "Next.js App Router + Prisma + PostgreSQL business application emphasis."
priority_surfaces:
  - app-api-routes
  - server-components
  - prisma-schema
  - prisma-migrations
  - prisma-transactions
  - route-handler-validation
  - nextauth-session-context
  - filesystem-backed-private-files
invariant_templates:
  - "Route handlers that mutate core state must validate input, bind the actor/scope, execute atomically, and return an observable result."
  - "Prisma schema constraints should enforce invariants that cannot safely rely on route-local checks."
  - "Long business flows should not rely on stale client state for amounts, status, ownership, or effective dates."
  - "Database records and private files must have a detectable consistency relationship and backup/restore story."
maps_to_lanes:
  state-model-integrity:
    - prisma-schema
    - raw-sql-constraints
  workflow-atomicity:
    - prisma-transactions
    - route-handler-mutations
  lifecycle-recovery:
    - prisma-migrations
    - filesystem-backed-private-files
  runtime-cutover-controls:
    - env-validation
    - deploy-migrate-build-order
anti_tunnel:
  universal_reportability: true
  overlays_may_add_focus_but_not_hide_unrelated_high_severity_findings: true
