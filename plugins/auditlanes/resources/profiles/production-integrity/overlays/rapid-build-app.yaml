version: 1
id: rapid-build-app
profile: production-integrity
status: experimental
description: "Emphasis for fast-moving or AI-assisted apps where implementation breadth may outrun invariant design, canonical helpers, negative tests, and regression coverage."
priority_surfaces:
  - duplicated-business-logic
  - generated-looking-route-handlers
  - broad-helper-functions
  - thin-server-actions
  - unreviewed-migrations
  - optimistic-ui-assumptions
  - sparse-negative-tests
invariant_templates:
  - "Every critical workflow should have one authoritative implementation of the rule, not many route-local copies."
  - "High-risk helper APIs should make illegal use hard by requiring actor, scope, transaction, and idempotency context where relevant."
  - "Generated or fast-added features should have explicit negative tests for boundary and retry behavior."
  - "Docs and TODOs must not be the only place a production constraint exists."
maps_to_lanes:
  state-model-integrity:
    - canonical-invariants
    - schema-backed-constraints
  workflow-atomicity:
    - duplicated-mutation-flows
    - route-local-side-effects
  assurance-evidence:
    - sparse-negative-tests
    - missing-regression-proof
anti_tunnel:
  universal_reportability: true
  overlays_may_add_focus_but_not_hide_unrelated_high_severity_findings: true
