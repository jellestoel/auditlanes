version: 1
id: authz-deep-dive
profile: security
status: beta
description: "Authorization-focused deep dive over principals, objects, actions, tenant boundaries, bulk paths, exports, support flows, and policy consistency."
allowed_modes:
  - canonical-sweep
  - canonical-gap-fill
  - clonehunt
  - runtime-safe
