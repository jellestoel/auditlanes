version: 1
id: monorepo
profile: security
status: stable
description: "Monorepo emphasis for coverage coordination, multiple applications, shared auth libraries, generated clients, internal packages, duplicated config, and package-boundary trust."
priority_surfaces:
  - multiple-apps
  - shared-auth-libraries
  - generated-clients
  - internal-packages
  - duplicated-config
  - package-boundary-trust
invariant_templates:
  - "All application entrypoints in the repo must be mapped before concluding coverage is complete."
  - "Shared auth, tenant, and client libraries must be checked against every consuming app's assumptions."
  - "Generated clients and internal packages must not hide cross-service trust or stale authorization contracts."
  - "Duplicated config across apps must not create inconsistent cookie, CORS, secret, or tenant boundaries."
anti_tunnel:
  universal_reportability: true
  overlays_may_add_focus_but_not_hide_unrelated_high_severity_findings: true
