version: 1
id: realtime-messaging
profile: security
status: stable
description: "Realtime messaging emphasis for WebSockets, subscriptions, channels, rooms, SSE, pub/sub, event spoofing, replay, reconnect auth, broadcast targeting, and presence leaks."
priority_surfaces:
  - websockets
  - subscriptions
  - channels-rooms
  - pubsub
  - broadcast-targeting
  - reconnect-auth
  - presence
invariant_templates:
  - "Room, channel, and subscription membership must be authorized on join and revalidated after reconnect or session changes."
  - "Client-emitted events must not spoof sender identity, tenant scope, room membership, or privileged server actions."
  - "Broadcast targeting must not leak events, presence, or sensitive state across users, rooms, or tenants."
  - "Replay, duplicate delivery, and stale connection state must not bypass current authorization."
anti_tunnel:
  universal_reportability: true
  overlays_may_add_focus_but_not_hide_unrelated_high_severity_findings: true
