version: 1
id: developer-tool
profile: security
status: stable
description: "Developer tooling and repo-scanner emphasis for untrusted project input, path boundaries, command execution, plugin/control-plane separation, and generated artifact safety."
priority_surfaces:
  - untrusted-repo-input
  - path-resolution
  - symlink-boundaries
  - plugin-root-target-root-split
  - yaml-json-parsing
  - generated-output-writes
  - command-execution-policy
invariant_templates:
  - "Repository contents must never become control-plane instructions unless explicitly trusted."
  - "Resolved input and output paths must not escape the target root or run directory."
  - "Symlinked manifests, sidecars, state files, and generated outputs must not be trusted blindly."
  - "Generated audit output must not be scanned as fresh application evidence."
  - "Repo-provided scripts, tests, package hooks, and networked commands must not run without explicit approval."
anti_tunnel:
  universal_reportability: true
  overlays_may_add_focus_but_not_hide_unrelated_high_severity_findings: true
