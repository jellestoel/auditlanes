version: 1
id: identity-federation
profile: security
status: stable
description: "Identity federation emphasis for OAuth, OIDC, SAML, magic links, invitations, password reset, account linking, SCIM provisioning, and SSO tenant binding."
priority_surfaces:
  - oauth-oidc
  - saml
  - account-linking
  - magic-links
  - invitations
  - password-reset
  - scim-provisioning
invariant_templates:
  - "OAuth and OIDC flows must bind state, nonce, redirect URI, tenant, and user session before account changes."
  - "SAML and OIDC token validation must verify issuer, audience, signature, expiration, tenant binding, and replay controls."
  - "Account linking, invitations, and magic links must not let an attacker attach or assume another user's identity."
  - "SCIM and SSO provisioning must not create roles, tenants, or memberships outside the trusted identity boundary."
anti_tunnel:
  universal_reportability: true
  overlays_may_add_focus_but_not_hide_unrelated_high_severity_findings: true
