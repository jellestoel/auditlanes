version: 1
id: background-jobs
profile: security
status: stable
description: "Background job and async worker emphasis for request-to-job trust transfer, queue payload authenticity, authorization, idempotency, retries, cron tasks, and delayed side effects."
priority_surfaces:
  - queues
  - job-payloads
  - scheduled-tasks
  - retry-side-effects
  - dead-letter-handling
  - async-fulfillment
invariant_templates:
  - "Job payloads must not be treated as trusted authorization, tenant, amount, or object state without revalidation."
  - "Retries, duplicate deliveries, and reordered messages must not double-charge, double-fulfill, or repeat privileged actions."
  - "Scheduled jobs must enforce the same object and tenant boundaries as request-time code."
  - "Queue producers and consumers must agree on authenticated message provenance and schema expectations."
anti_tunnel:
  universal_reportability: true
  overlays_may_add_focus_but_not_hide_unrelated_high_severity_findings: true
